<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chuanhoaAI - Lịch Trình Đi Trường Cá Nhân</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="header-logo">
                <i class="fa-solid fa-graduation-cap logo-icon"></i>
                <div class="logo-text">
                    <h1>chuanhoaAI</h1>
                    <span>Lịch Học Tập & Đi Trường Phân Theo Tuần</span>
                </div>
            </div>
            
            <div class="header-controls">
                <div class="control-group">
                    <label for="user-name-input"><i class="fa-solid fa-user-edit"></i> Họ và Tên</label>
                    <input type="text" id="user-name-input" class="form-input-name" placeholder="Nhập tên..." value="Trần Quang Nguyên">
                </div>
                
                <div class="control-group">
                    <label for="month-select"><i class="fa-solid fa-calendar-days"></i> Tháng</label>
                    <select id="month-select" class="form-select">
                        <!-- Will be populated by JS -->
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="year-select"><i class="fa-solid fa-clock"></i> Năm</label>
                    <select id="year-select" class="form-select">
                        <!-- Will be populated by JS -->
                    </select>
                </div>

                <div class="action-buttons">
                    <button id="btn-export-csv" class="btn btn-success">
                        <i class="fa-solid fa-file-csv"></i> Xuất File Excel (CSV)
                    </button>
                    <button id="btn-print" class="btn btn-secondary">
                        <i class="fa-solid fa-print"></i> In Bản Kế Hoạch (A4)
                    </button>
                    <button id="btn-clear-month" class="btn btn-danger">
                        <i class="fa-solid fa-eraser"></i> Xóa Lịch Tháng Này
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-overview">
            <div class="stat-card card-school">
                <div class="stat-icon"><i class="fa-solid fa-school"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Số Ca Đi Trường</span>
                    <span id="stat-school-days" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card card-exam">
                <div class="stat-icon"><i class="fa-solid fa-pen-clip"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Số Ca Thi Cử</span>
                    <span id="stat-exams" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card card-holiday">
                <div class="stat-icon"><i class="fa-solid fa-umbrella-beach"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Nghỉ Lễ / Tết</span>
                    <span id="stat-holidays" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card card-off">
                <div class="stat-icon"><i class="fa-solid fa-house-user"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Số Ca Nghỉ Học</span>
                    <span id="stat-off-days" class="stat-value">0</span>
                </div>
            </div>
        </section>

        <!-- Calendar Section -->
        <main class="calendar-wrapper">
            <div class="calendar-card">
                <div class="calendar-header-info">
                    <h2 id="calendar-title">BẢNG LỊCH TRÌNH CHI TIẾT - THÁNG 06/2026</h2>
                    <div class="legend-container">
                        <span class="legend-item"><span class="badge badge-study"><i class="fa-solid fa-book-open"></i></span> Đi trường</span>
                        <span class="legend-item"><span class="badge badge-exam"><i class="fa-solid fa-pen-clip"></i></span> Thi cử</span>
                        <span class="legend-item"><span class="badge badge-holiday"><i class="fa-solid fa-umbrella-beach"></i></span> Nghỉ lễ</span>
                        <span class="legend-item"><span class="badge badge-event"><i class="fa-solid fa-star"></i></span> Sự kiện</span>
                        <span class="legend-item"><span class="badge badge-off"><i class="fa-solid fa-circle-xmark"></i></span> Nghỉ học</span>
                        <span class="legend-item"><span class="badge badge-empty"><i class="fa-solid fa-minus"></i></span> Chưa xếp</span>
                    </div>
                </div>
                
                <!-- Weekly segmented tables container -->
                <div id="weeks-container" class="weeks-container">
                    <!-- Weekly tables will be generated by JS -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 chuanhoaAI. Bản quyền thuộc về Antigravity.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
